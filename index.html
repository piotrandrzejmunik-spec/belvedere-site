<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realizacje Wideo</title>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.video-grid video {
  width: 100%;
  border-radius: 10px;
  background: #000;
}
</style>
</head>

<body>
<h1>Realizacje Wideo</h1>

<div class="video-grid">
<video preload="none" controls><source src="videos/1.mp4" type="video/mp4"></video>
<video preload="none" controls><source src="videos/2.mp4" type="video/mp4"></video>
<video preload="none" controls><source src="videos/3.mp4" type="video/mp4"></video>
<video preload="none" controls><source src="videos/4.mp4" type="video/mp4"></video>
<video preload="none" controls><source src="videos/5.mp4" type="video/mp4"></video>
<video preload="none" controls><source src="videos/6.mp4" type="video/mp4"></video>
</div></body></html>
